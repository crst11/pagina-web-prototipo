services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: localshop-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-LocalShop2026!Docker}
    ports:
      - "${MSSQL_HOST_PORT:-14333}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  database-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: localshop-database-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-LocalShop2026!Docker}
    volumes:
      - ./database/sqlserver/docker-init.sql:/scripts/docker-init.sql:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd
      -S sqlserver
      -U sa
      -P \"$${MSSQL_SA_PASSWORD}\"
      -No
      -b
      -i /scripts/docker-init.sql"
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: localshop-backend
    depends_on:
      database-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SqlServer: "Driver={ODBC Driver 18 for SQL Server};Server=sqlserver,1433;Database=TiendaMicroempresas;Uid=sa;Pwd=${MSSQL_SA_PASSWORD:-LocalShop2026!Docker};Encrypt=Yes;TrustServerCertificate=Yes;"
      Cors__AllowedOrigins__0: "http://localhost:${FRONTEND_PORT:-4200}"
    ports:
      - "${BACKEND_PORT:-5057}:8080"

  frontend:
    build:
      context: ./frontend
    container_name: localshop-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4200}:80"

volumes:
  sqlserver-data:
